name: luacheck
description: Runs luacheck in a pre-built Docker container. No setup, instant run.
branding:
  icon: check-square
  color: yellow

inputs:
  files:
    description: >
      Files, rockspecs, or directories to check. Relative to path.
    required: false
    default: '.'
  path:
    description: >
      Working directory for luacheck. Defaults to the workspace.
    required: false
    default: ${{ github.workspace }}
  args:
    description: >
      Additional luacheck arguments. See https://luacheck.readthedocs.io/en/stable/cli.html
    required: false
    default: ''
  config:
    description: >
      URL to a custom .luacheckrc config file.
    required: false
    default: ''
  annotate:
    description: >
      Emit GitHub annotations for issues. "none", "warning", or "error".
      Requires warnings not be suppressed (avoid -qq or -qqq with args).
    required: false
    default: none

runs:
  using: composite
  steps:
    - name: Run luacheck
      run: |
        echo "::group::Pull luacheck image"
        docker pull ghcr.io/dekallo/luacheck:latest
        echo "::endgroup::"
        docker run --rm \
          -v "${{ github.workspace }}:/workspace" \
          -w /workspace \
          -e INPUT_FILES="${{ inputs.files }}" \
          -e INPUT_ARGS="${{ inputs.args }}" \
          -e INPUT_CONFIG="${{ inputs.config }}" \
          -e INPUT_ANNOTATE="${{ inputs.annotate }}" \
          -e GITHUB_WORKSPACE=/workspace \
          ghcr.io/dekallo/luacheck:latest
      shell: bash
