name: luacheck
description: Runs luacheck in Docker. Optionally runs a custom Lua script (from URL or path) after or instead of luacheck.
branding:
  icon: check-square
  color: yellow

inputs:
  files:
    description: >
      What to pass to luacheck (default "." = whole repo). Narrow only if you want to limit scope.
    required: false
    default: '.'
  path:
    description: >
      Working directory for luacheck. Relative to workspace root. Use "." for repo root.
    required: false
    default: '.'
  args:
    description: >
      Additional luacheck arguments. See https://luacheck.readthedocs.io/en/stable/cli.html
    required: false
    default: ''
  config:
    description: >
      URL to a custom .luacheckrc config file.
    required: false
    default: ''
  annotate:
    description: >
      Emit GitHub annotations for issues. "none", "warning", or "error".
      Requires warnings not be suppressed (avoid -qq or -qqq with args).
    required: false
    default: none
  custom_script:
    description: >
      URL or path (relative to path, or absolute) to a Lua script to run after luacheck.
    required: false
    default: ''
  custom_args:
    description: >
      Arguments passed to the custom script.
    required: false
    default: '.'
  run_luacheck:
    description: >
      When false, skip luacheck (script-only mode).
    required: false
    default: true
  fail_fast:
    description: >
      When true, exit on first failure (luacheck or script). When false, run both and exit with failure if any failed.
    required: false
    default: false
  job_summary:
    description: >
      When true, append a Markdown summary to the workflow run Summary tab (GITHUB_STEP_SUMMARY).
    required: false
    default: false

runs:
  using: composite
  steps:
    - name: Run luacheck
      shell: bash
      run: |
        docker pull -q ghcr.io/dekallo/luacheck:latest

        EXTRA=()
        if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
          EXTRA+=(-v "${GITHUB_STEP_SUMMARY}:${GITHUB_STEP_SUMMARY}")
          EXTRA+=(-e GITHUB_STEP_SUMMARY)
        fi

        set +e
        output=$(docker run --rm \
          "${EXTRA[@]}" \
          -v "${{ github.workspace }}:/workspace" \
          -w /workspace \
          -e INPUT_FILES="${{ inputs.files }}" \
          -e INPUT_PATH="${{ inputs.path }}" \
          -e INPUT_ARGS="${{ inputs.args }}" \
          -e INPUT_CONFIG="${{ inputs.config }}" \
          -e INPUT_ANNOTATE="${{ inputs.annotate }}" \
          -e INPUT_CUSTOM_SCRIPT="${{ inputs.custom_script }}" \
          -e INPUT_CUSTOM_ARGS="${{ inputs.custom_args }}" \
          -e INPUT_RUN_LUACHECK="${{ inputs.run_luacheck }}" \
          -e INPUT_FAIL_FAST="${{ inputs.fail_fast }}" \
          -e INPUT_JOB_SUMMARY="${{ inputs.job_summary }}" \
          -e GITHUB_WORKSPACE=/workspace \
          ghcr.io/dekallo/luacheck:latest 2>&1)
        exitcode=$?
        echo "$output"
        exit "$exitcode"
