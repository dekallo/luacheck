name: luacheck
description: Runs luacheck in a pre-built Docker container. Optionally runs a custom Lua script (from URL or path) after or instead of luacheck.
branding:
  icon: check-square
  color: yellow

inputs:
  files:
    description: >
      Files, rockspecs, or directories to check. Relative to path.
    required: false
    default: '.'
  path:
    description: >
      Working directory for luacheck. Relative to workspace root. Use "." for repo root.
    required: false
    default: '.'
  args:
    description: >
      Additional luacheck arguments. See https://luacheck.readthedocs.io/en/stable/cli.html
    required: false
    default: ''
  config:
    description: >
      URL to a custom .luacheckrc config file.
    required: false
    default: ''
  annotate:
    description: >
      Emit GitHub annotations for issues. "none", "warning", or "error".
      Requires warnings not be suppressed (avoid -qq or -qqq with args).
    required: false
    default: none
  custom_script:
    description: >
      URL or path (relative to path, or absolute) to a Lua script to run after luacheck.
    required: false
    default: ''
  custom_args:
    description: >
      Arguments passed to the custom script.
    required: false
    default: '.'
  run_luacheck:
    description: >
      When false, skip luacheck (script-only mode).
    required: false
    default: true
  fail_fast:
    description: >
      When true, exit on first failure (luacheck or script). When false, run both and exit with failure if any failed.
    required: false
    default: false

runs:
  using: composite
  steps:
    - id: detect
      run: |
        if [ -x /entrypoint.sh ]; then
          echo "mode=job" >> "$GITHUB_OUTPUT"
        else
          echo "mode=host" >> "$GITHUB_OUTPUT"
        fi
      shell: bash

    # --- Job mode: multiple steps ---
    - id: luacheck
      name: Run luacheck
      if: steps.detect.outputs.mode == 'job' && inputs.run_luacheck == 'true'
      env:
        INPUT_FILES: ${{ inputs.files }}
        INPUT_PATH: ${{ inputs.path }}
        INPUT_ARGS: ${{ inputs.args }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_ANNOTATE: ${{ inputs.annotate }}
        INPUT_CUSTOM_SCRIPT: ${{ inputs.custom_script }}
        INPUT_CUSTOM_ARGS: ${{ inputs.custom_args }}
        INPUT_RUN_LUACHECK: ${{ inputs.run_luacheck }}
        INPUT_FAIL_FAST: ${{ inputs.fail_fast }}
      run: /entrypoint.sh luacheck
      shell: sh

    - id: script
      name: Run custom script
      if: always() && steps.detect.outputs.mode == 'job' && inputs.custom_script != '' && (inputs.fail_fast != 'true' || steps.luacheck.outcome == 'success' || steps.luacheck.outcome == 'skipped')
      env:
        INPUT_FILES: ${{ inputs.files }}
        INPUT_PATH: ${{ inputs.path }}
        INPUT_ARGS: ${{ inputs.args }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_ANNOTATE: ${{ inputs.annotate }}
        INPUT_CUSTOM_SCRIPT: ${{ inputs.custom_script }}
        INPUT_CUSTOM_ARGS: ${{ inputs.custom_args }}
        INPUT_RUN_LUACHECK: ${{ inputs.run_luacheck }}
        INPUT_FAIL_FAST: ${{ inputs.fail_fast }}
      run: /entrypoint.sh script
      shell: sh

    # --- Host mode: single step ---
    - id: host
      if: steps.detect.outputs.mode == 'host'
      name: Run luacheck
      run: |
        docker pull -q ghcr.io/dekallo/luacheck:latest >/dev/null 2>&1
        set +e
        output=$(docker run --rm \
          -v "${{ github.workspace }}:/workspace" \
          -w /workspace \
          -e INPUT_FILES="${{ inputs.files }}" \
          -e INPUT_PATH="${{ inputs.path }}" \
          -e INPUT_ARGS="${{ inputs.args }}" \
          -e INPUT_CONFIG="${{ inputs.config }}" \
          -e INPUT_ANNOTATE="${{ inputs.annotate }}" \
          -e INPUT_CUSTOM_SCRIPT="${{ inputs.custom_script }}" \
          -e INPUT_CUSTOM_ARGS="${{ inputs.custom_args }}" \
          -e INPUT_RUN_LUACHECK="${{ inputs.run_luacheck }}" \
          -e INPUT_FAIL_FAST="${{ inputs.fail_fast }}" \
          -e GITHUB_WORKSPACE=/workspace \
          ghcr.io/dekallo/luacheck:latest 2>&1)
        exitcode=$?
        if [ -n "$output" ]; then
          echo "$output"
        else
          echo "::warning::No output from luacheck container"
        fi
        exit "$exitcode"
      shell: bash
